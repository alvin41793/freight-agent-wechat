version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - GIN_MODE=release
    env_file:
      - .env
    depends_on:
      - redis
      - mysql
    restart: unless-stopped
    networks:
      - freight-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - freight-network

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=Fr3ight@2026!Secure
      - MYSQL_DATABASE=freight_agent
      - TZ=Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    networks:
      - freight-network

volumes:
  redis-data:
  mysql-data:

networks:
  freight-network:
    driver: bridge
